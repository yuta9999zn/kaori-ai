<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>{{ subject }}</title>
</head>
<body style="font-family: Helvetica, Arial, sans-serif; color: #1f2933; line-height: 1.5; padding: 24px; background: #fafaf7;">
  <div style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 28px 32px; border-radius: 8px; border: 1px solid #e4e7eb;">
    <h2 style="color: #d64545; margin: 0 0 16px;">{{ subject }}</h2>
    <div style="white-space: pre-wrap;">{{ body }}</div>
    {% if cc %}
    <p style="margin-top: 20px; font-size: 12px; color: #52606d;">CC: {{ cc | join(', ') }}</p>
    {% endif %}
    <hr style="margin-top: 24px; border: none; border-top: 1px solid #e4e7eb;">
    <p style="font-size: 11px; color: #52606d; margin: 12px 0 0;">Email này được gửi tự động từ workflow trên Kaori AI. Trả lời email này để được hỗ trợ.</p>
  </div>
</body>
</html>

{{- if .Values.global.serviceAccount.create }}
{{/*
Shared ServiceAccount for all Kaori app pods. On EKS this carries the
IRSA annotation (eks.amazonaws.com/role-arn) so pods assume an IAM role
for S3 (blob store), Secrets Manager, and CloudWatch WITHOUT static AWS
keys — the AWS-native answer to K-18 (no long-lived secrets).

Per-service overrides (data-pipeline / ai-orchestrator may want a
narrower S3-scoped role) are declared under services.<name>.serviceAccount.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.global.serviceAccount.name | default "kaori-services" }}
  labels:
    {{- include "kaori-services.labels" . | nindent 4 }}
  {{- with .Values.global.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.global.serviceAccount.automountToken | default false }}
{{- range $name, $svc := .Values.services }}
{{- if and $svc.enabled $svc.serviceAccount $svc.serviceAccount.name }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $svc.serviceAccount.name }}
  labels:
    {{- include "kaori-services.serviceLabels" (dict "name" $name "root" $) | nindent 4 }}
  {{- with $svc.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ $svc.serviceAccount.automountToken | default false }}
{{- end }}
{{- end }}
{{- end }}

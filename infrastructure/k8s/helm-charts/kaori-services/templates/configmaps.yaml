{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
  labels:
    {{- include "kaori-services.serviceLabels" (dict "name" $name "root" $) | nindent 4 }}
data:
  # Common config across services. Per-service env overrides go through
  # the deployment env block (values.yaml services.<name>.env).
  KAORI_ENV: {{ $.Release.Namespace | quote }}
  KAORI_SERVICE_NAME: {{ $name | quote }}
  TRACING_ENABLED: "true"
{{- end }}
{{- end }}

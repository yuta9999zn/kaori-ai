{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "kaori-services.serviceLabels" (dict "name" $name "root" $) | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        {{- include "kaori-services.serviceLabels" (dict "name" $name "root" $) | nindent 8 }}
      annotations:
        # Force pod restart on configmap change.
        kaori.ai/config-checksum: {{ include (print $.Template.BasePath "/configmaps.yaml") $ | sha256sum }}
    spec:
      containers:
        - name: {{ $name }}
          image: {{ include "kaori-services.image" (dict "service" $svc "root" $) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.containerPort }}
              protocol: TCP
          env:
            {{- range $key, $value := $svc.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            # Common observability + secrets injection
            {{- include "kaori-services.otelEnv" $ | nindent 12 }}
            {{- include "kaori-services.vaultEnv" $ | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ $name }}-config
            - secretRef:
                name: {{ $name }}-secrets
                optional: true
          {{- with $svc.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml ($svc.resources | default $.Values.global.resources) | nindent 12 }}
{{- end }}
{{- end }}

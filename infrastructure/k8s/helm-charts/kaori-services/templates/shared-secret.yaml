{{- if .Values.global.secrets.create }}
{{/*
Shared Secret holding every platform credential the services pull via
secretKeyRef (see _helpers.tpl commonEnv/pythonEnv/javaEnv + per-service
extraEnv). Rendered ONLY when global.secrets.create=true — the default
(and the recommended production path) is create=false, with the Secret
populated out-of-band by the External Secrets Operator syncing from AWS
Secrets Manager, or by Vault Agent Injector. Committing real values here
would defeat K-18 / red-team C2, so the inline path is dev-only.

Values come from global.secrets.data (base64 is applied by `stringData`).
Empty string = key present but blank (dev fallback where KAORI_PROFILE!=
production tolerates it).
*/}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.global.secrets.name | default "kaori-shared-secret" }}
  labels:
    {{- include "kaori-services.labels" . | nindent 4 }}
type: Opaque
stringData:
  app-db-password: {{ .Values.global.secrets.data.appDbPassword | default "" | quote }}
  jwt-public-key: {{ .Values.global.secrets.data.jwtPublicKey | default "" | quote }}
  jwt-private-key: {{ .Values.global.secrets.data.jwtPrivateKey | default "" | quote }}
  mfa-key: {{ .Values.global.secrets.data.mfaKey | default "" | quote }}
  field-key: {{ .Values.global.secrets.data.fieldKey | default "" | quote }}
  internal-svc-token: {{ .Values.global.secrets.data.internalSvcToken | default "" | quote }}
  smtp-password: {{ .Values.global.secrets.data.smtpPassword | default "" | quote }}
  anthropic-api-key: {{ .Values.global.secrets.data.anthropicApiKey | default "" | quote }}
  openai-api-key: {{ .Values.global.secrets.data.openaiApiKey | default "" | quote }}
  vault-token: {{ .Values.global.secrets.data.vaultToken | default "" | quote }}
  google-client-secret: {{ .Values.global.secrets.data.googleClientSecret | default "" | quote }}
  microsoft-client-secret: {{ .Values.global.secrets.data.microsoftClientSecret | default "" | quote }}
{{- end }}

# P1-S2 (P1-MTNT setup + K-18 Phase 1.5 prep) — Vault dev mode for local
# development. NOT for production: in-memory storage, dev-token auth,
# auto-unsealed.
#
# Usage:
#   docker compose -f infrastructure/vault/docker-compose.yml up -d
#   curl http://localhost:8200/v1/sys/health
#
# Default dev token: "kaori-dev-root" (same as VAULT_TOKEN env in
# .env.example). Services that opt into Vault-backed secrets in Phase
# 1.5+ point at VAULT_ADDR=http://vault:8200 + VAULT_TOKEN=$KAORI_VAULT_DEV_TOKEN.
#
# Production (P15-S9): Helm chart with HA Raft (3 nodes), KMS auto-unseal,
# AppRole auth method. See infrastructure/vault/README.md.

version: "3.9"

services:
  vault:
    image: hashicorp/vault:1.15
    container_name: kaori-vault-dev
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${KAORI_VAULT_DEV_TOKEN:-kaori-dev-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kaori_network

networks:
  kaori_network:
    external: true
    name: kaori_kaori_network
